<!DOCTYPE html>

<html>
<head>
<title>DrainSense</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#0a192f,#020c1b 70%);
color:white;
}

.header{
text-align:center;
padding:20px;
font-size:30px;
background:linear-gradient(90deg,#141e30,#243b55);
font-weight:bold;
letter-spacing:2px;
text-shadow:0 0 15px #00f2fe;
}

.early-warning{
display:none;
text-align:center;
padding:12px;
font-weight:bold;
background:linear-gradient(90deg,#ff0033,#ff6a00);
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.6;}
100%{opacity:1;}
}

.container{
display:flex;
justify-content:space-around;
margin:20px;
flex-wrap:wrap;
}

.card{
padding:20px;
border-radius:20px;
width:230px;
text-align:center;
margin:10px;
backdrop-filter:blur(12px);
background:rgba(255,255,255,0.06);
transition:0.35s ease;
border:1px solid rgba(255,255,255,0.08);
}

.card-title{
padding:6px 18px;
border-radius:22px;
font-size:15px;
font-weight:bold;
margin-bottom:12px;
background:linear-gradient(135deg,rgba(255,255,255,0.95),rgba(230,230,255,0.75));
color:#000;
}

.value{
font-size:26px;
margin-top:10px;
font-weight:bold;
}

.progress-bar{
width:100%;
height:10px;
background:#222;
border-radius:20px;
margin-top:10px;
}

.progress{
height:10px;
border-radius:20px;
width:0%;
transition:0.5s;
background:linear-gradient(90deg,#00f2fe,#4facfe);
}

.card:nth-child(1){box-shadow:0 0 25px #00f2fe;}
.card:nth-child(2){box-shadow:0 0 25px #ff9800;}
.card:nth-child(3){box-shadow:0 0 25px #4facfe;}
.card:nth-child(4){box-shadow:0 0 25px #9c27b0;}
.card:nth-child(5){box-shadow:0 0 25px #ff0033;}

#severity{
font-size:26px;
font-weight:bold;
text-shadow:0 0 12px #ff0033;
}

.bottom-section{
display:flex;
margin:20px;
gap:20px;
}

#map{
height:420px;
flex:2;
border-radius:20px;
box-shadow:0 0 35px #4b00ff;
}

#forecastContainer{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:20px;
box-shadow:0 0 25px #00f2fe;
}

.right-panel{
flex:1;
display:flex;
flex-direction:column;
gap:20px;
}

.forecast-item{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.solar-box{
padding:2px;
border-radius:5px;
background:rgba(255,255,255,0.05);
text-align:center;
box-shadow:0 0 20px #ffd700;
}

</style>

</head>

<body>

<div class="header">🌊 DrainSense</div>

<div class="early-warning" id="earlyWarning">
🚨 EARLY FLOOD RISK DETECTED
</div>

<div class="container">

<div class="card">
<div class="card-title">💧 Water Level</div>
<div class="value" id="water">--</div>
<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>
</div>

<div class="card">
<div class="card-title">🚧 Blockage</div>
<div class="value" id="blockage">--</div>
</div>

<div class="card">
<div class="card-title">🌧 Rainfall</div>
<div class="value" id="rain">--</div>
</div>

<div class="card">
<div class="card-title">☁️ Weather</div>
<div class="value" id="weatherDesc">Loading...</div>
<div class="value" id="temp"></div>
</div>

<div class="card">
<div class="card-title">🚨 Severity</div>
<div class="value">
<span id="severity">--</span>
</div>
</div>

</div>

<div class="bottom-section">

<div id="map"></div>

<div class="right-panel">

<div id="forecastContainer">
<h3 style="text-align:center;">🌦 Weather Forecast</h3>
<div id="forecastList">Loading forecast...</div>
</div>

<div class="solar-box">

<h3>☀ Solar Power</h3>

<div style="font-size:24px;font-weight:bold;" id="solarVoltage">
-- V
</div>

<div class="progress-bar">
<div class="progress" id="solarBar"></div>
</div>

</div>

</div>

</div>

<script>

/* FIREBASE */

var firebaseConfig={
databaseURL:"https://locationbased-cb8f9-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
var database=firebase.database();

/* LOCATION */

var lat=17.591;
var lon=78.3626;

/* VARIABLES */

var rainNow=false;

/* MAP */

var map=L.map('map').setView([lat,lon],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var marker=L.marker([lat,lon]).addTo(map);

marker.bindPopup(
"🚧 Smart Drain Monitoring System<br>"+
"Gokaraju Rangaraju Institute of Engineering and Technology"
).openPopup();

/* FIREBASE DATA */

database.ref("drainage_monitor/gokaraju_college").on("value",function(snapshot){

var data=snapshot.val();
if(!data) return;

document.getElementById("water").innerHTML=data.water_level+" cm";

/* BLOCKAGE FROM TURBIDITY SENSOR */

let turb = Number(data.turbidity_value);

let blockageLevel="--";

if(!isNaN(turb)){

if(turb < 500)
blockageLevel="BLOCKED DRAIN";

else if(turb < 1500)
blockageLevel="VERY MUDDY";

else if(turb < 2500)
blockageLevel="MUDDY";

else if(turb < 3000)
blockageLevel="SLIGHTLY MUDDY";

else
blockageLevel="CLEAR WATER";

}

document.getElementById("blockage").innerHTML=blockageLevel;

/* RAIN SENSOR CONDITION */

let rain = Number(data.rain_value);

let rainLevel="--";

if(!isNaN(rain)){

if(rain < 500)
rainLevel="INTENSE RAIN";

else if(rain < 1500)
rainLevel="HEAVY RAIN";

else if(rain < 2500)
rainLevel="MODERATE RAIN";

else if(rain < 3500)
rainLevel="LIGHT RAIN";

else
rainLevel="NO RAIN";

}

document.getElementById("rain").innerHTML=rainLevel;

document.getElementById("progress").style.width=data.water_level+"%";

/* SEVERITY */

let severity=calculateSeverity(data);

document.getElementById("severity").innerHTML=severity;

document.getElementById("earlyWarning").style.display=
(severity==="HIGH"||severity==="MEDIUM")?"block":"none";

/* SOLAR */

if(data.solar_voltage){

let v=data.solar_voltage;

document.getElementById("solarVoltage").innerHTML=v.toFixed(2)+" V";

let percent=((v-3.2)/(4.2-3.2))*100;

percent=Math.max(0,Math.min(100,percent));

document.getElementById("solarBar").style.width=percent+"%";

}

});

/* WEATHER API */

var apiKey="YOUR_OPENWEATHER_API_KEY";
function fetchWeather(){

fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`)
.then(res=>res.json())
.then(data=>{

if(data.weather){
document.getElementById("weatherDesc").innerHTML=data.weather[0].main;
document.getElementById("temp").innerHTML=data.main.temp+" °C";
}

})
.catch(()=>{
document.getElementById("weatherDesc").innerHTML="Unavailable";
});

}

function fetchForecast(){

fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`)
.then(res=>res.json())
.then(data=>{

if(!data.list){
document.getElementById("forecastList").innerHTML="Forecast unavailable";
return;
}

let html="";

for(let i=0;i<5;i++){

let item=data.list[i];
let time=item.dt_txt.split(" ")[1].substring(0,5);
let condition=item.weather[0].main;
let temp=item.main.temp;

html+=`<div class="forecast-item">⏰ ${time} — ${condition}, ${temp}°C</div>`;

}

document.getElementById("forecastList").innerHTML=html;

})
.catch(()=>{
document.getElementById("forecastList").innerHTML="Forecast unavailable";
});

}

function calculateSeverity(data){

let level=data.water_level;
let turb=data.turbidity_value;

if(level>=18||turb<500)
return "HIGH";

if(level>=15)
return "MEDIUM";

return "LOW";

}

/* START WEATHER */

fetchWeather();
fetchForecast();

setInterval(fetchWeather,300000);
setInterval(fetchForecast,600000);

</script>

</body>
</html>
